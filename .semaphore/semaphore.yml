version: v1.0
name: Flask App - Canary Deployment
agent:
  machine:
    type: f1-standard-2
    os_image: ubuntu2404
fail_fast:
  stop:
    when: branch != 'main'
auto_cancel:
  running:
    when: branch != 'main'

blocks:
  - name: Build and Push Image
    dependencies: []
    task:
      secrets:
        - name: DOCKER_LOGIN
      jobs:
        - name: Build and push Docker image
          commands:
            - checkout
            - cd 3-canary-deployment
            - echo "$DOCKER_PASSWORD" | docker login -u "$DOCKER_USERNAME" --password-stdin
            - 'docker build -t "$DOCKER_USERNAME/my-flask-image:latest" .'
            - 'docker push "$DOCKER_USERNAME/my-flask-image:latest"'

  - name: Deploy Stable
    dependencies:
      - Build and Push Image
    task:
      secrets:
        - name: DOCKER_LOGIN
      jobs:
        - name: Deploy stable manifests
          commands:
            - checkout
            - export KUBECONFIG=$(pwd)/kubeconfig.yml
            - 'curl -LO "https://dl.k8s.io/release/$(curl -sL https://dl.k8s.io/release/stable.txt)/bin/linux/amd64/kubectl"'
            - chmod +x kubectl && sudo mv kubectl /usr/local/bin/
            - kubectl create namespace g4 || true
            - cd 3-canary-deployment
            - sed -i "s|DOCKER_USERNAME|$DOCKER_USERNAME|g" deployment-stable.yml
            - kubectl apply -f deployment-stable.yml -n g4 --validate=false
            - kubectl apply -f service.yml -n g4 --validate=false
            - kubectl rollout status deployment/flask-app-stable -n g4 --timeout=120s

  - name: Verify Stable
    dependencies:
      - Deploy Stable
    task:
      jobs:
        - name: Check stable service
          commands:
            - checkout
            - export KUBECONFIG=$(pwd)/kubeconfig.yml
            - 'curl -LO "https://dl.k8s.io/release/$(curl -sL https://dl.k8s.io/release/stable.txt)/bin/linux/amd64/kubectl"'
            - chmod +x kubectl && sudo mv kubectl /usr/local/bin/
            - kubectl get svc flask-app -n g4

promotions:
  - name: Deploy Canary
    pipeline_file: deploy-canary.yml
